name: Build Papeterie APK
on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build_user_app:
    name: Build Papeterie User APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/user-app
        run: |
          npm install

      - name: Build APK (Local)
        working-directory: ./mobile/user-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive --output=./papeterie-user.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: papeterie-user-apk
          path: ./mobile/user-app/papeterie-user.apk

  build_driver_app:
    name: Build Papeterie Driver APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/driver-app
        run: |
          npm install

      - name: Build APK (Local)
        working-directory: ./mobile/driver-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive --output=./papeterie-driver.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: papeterie-driver-apk
          path: ./mobile/driver-app/papeterie-driver.apk
