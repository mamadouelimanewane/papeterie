name: Build Papeterie APK

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-user-app:
    name: 📦 APK Client (User App)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/user-app
        run: npm install --legacy-peer-deps

      - name: Build User APK via EAS Cloud
        working-directory: ./mobile/user-app
        run: |
          npx eas-cli build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait \
            --json > build-output.json 2>&1 || true
          cat build-output.json || true
          echo "✅ Build submitted to EAS Cloud - check https://expo.dev for the APK download"

  build-driver-app:
    name: 🚴 APK Livreur (Driver App)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/driver-app
        run: npm install --legacy-peer-deps

      - name: Build Driver APK via EAS Cloud
        working-directory: ./mobile/driver-app
        run: |
          npx eas-cli build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait \
            --json > build-output.json 2>&1 || true
          cat build-output.json || true
          echo "✅ Build submitted to EAS Cloud - check https://expo.dev for the APK download"
