name: Build Papeterie APK (Gratuit - Local)
on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-


      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies (User App)
        working-directory: ./mobile/user-app
        run: npm install

      - name: Install Dependencies (Driver App)
        working-directory: ./mobile/driver-app
        run: npm install

      - name: Build User App APK (Local)
        working-directory: ./mobile/user-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: Build Driver App APK (Local)
        working-directory: ./mobile/driver-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: papeterie-apks
          path: |
            mobile/**/*.apk

