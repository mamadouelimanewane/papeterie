name: Build Android APK (Local)
on:
  workflow_dispatch: # Permet de lancer manuellement le build

jobs:
  build_user_app:
    name: Build User App APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'mobile/user-app/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/user-app
        run: npm install

      - name: Build APK (Local)
        working-directory: ./mobile/user-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive --output=./ndugumi-user.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndugumi-user-apk
          path: ./mobile/user-app/ndugumi-user.apk

  build_driver_app:
    name: Build Driver App APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'mobile/driver-app/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/driver-app
        run: npm install

      - name: Build APK (Local)
        working-directory: ./mobile/driver-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive --output=./ndugumi-driver.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndugumi-driver-apk
          path: ./mobile/driver-app/ndugumi-driver.apk
