name: Build Papeterie APK (Gratuit - Local)

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-user-app:
    name: 📦 APK Client (User App)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/user-app
        run: npm install --legacy-peer-deps

      - name: Build User App APK (Local)
        working-directory: ./mobile/user-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: papeterie-user-apk
          path: mobile/user-app/**/*.apk
          if-no-files-found: warn

  build-driver-app:
    name: 🚴 APK Livreur (Driver App)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/driver-app
        run: npm install --legacy-peer-deps

      - name: Build Driver App APK (Local)
        working-directory: ./mobile/driver-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: Upload Driver APK
        uses: actions/upload-artifact@v4
        with:
          name: papeterie-driver-apk
          path: mobile/driver-app/**/*.apk
          if-no-files-found: warn
