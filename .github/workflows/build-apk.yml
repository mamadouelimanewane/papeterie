name: Build Papeterie APK (Cloud)
on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build_user_app:
    name: Build Papeterie User APK (Cloud)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build User App (Cloud)
        working-directory: ./mobile/user-app
        run: npx eas-cli build --platform android --profile preview --non-interactive --wait

  build_driver_app:
    name: Build Papeterie Driver APK (Cloud)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Driver App (Cloud)
        working-directory: ./mobile/driver-app
        run: npx eas-cli build --platform android --profile preview --non-interactive --wait
