name: Build APKs Android (Client & Livreur)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/**"

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: user-app
            name: "Client"
            package: "com.papeterie.userapp"
          - app: driver-app
            name: "Livreur"
            package: "com.papeterie.driverapp"
    name: "Build APK ${{ matrix.name }}"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Installation des dependances
        working-directory: ./mobile/${{ matrix.app }}
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (generation du projet Android natif)
        working-directory: ./mobile/${{ matrix.app }}
        env:
          EXPO_PUBLIC_API_URL: "https://papeterie.vercel.app/api"
          CI: "1"
        run: npx expo prebuild --platform android --clean

      - name: Creation du google-services.json
        working-directory: ./mobile/${{ matrix.app }}/android/app
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
            echo "google-services.json reel utilise"
          else
            cat > google-services.json << EOF
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "papeterie-app",
              "storage_bucket": "papeterie-app.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "${{ matrix.package }}"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIza0000000000000000000000000000000000000"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
            echo "google-services.json placeholder cree"
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Compilation de l APK Debug
        working-directory: ./mobile/${{ matrix.app }}/android
        env:
          EXPO_PUBLIC_API_URL: "https://papeterie.vercel.app/api"
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload de l APK
        uses: actions/upload-artifact@v4
        with:
          name: papeterie-${{ matrix.app }}-debug
          path: mobile/${{ matrix.app }}/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Afficher le lien de telechargement
        run: |
          echo "============================================"
          echo "APK ${{ matrix.name }} compile avec succes !"
          echo "Telecharger depuis l onglet Artifacts ci-dessous"
          echo "============================================"
