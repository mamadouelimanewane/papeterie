name: Build APKs Android (Client & Livreur)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/**"

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: user-app
            name: "Client"
            package: "com.papeterie.userapp"
          - app: driver-app
            name: "Livreur"
            package: "com.papeterie.driverapp"
    name: "Build APK ${{ matrix.name }}"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Installation des dependances
        working-directory: ./mobile/${{ matrix.app }}
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (generation du projet Android natif)
        working-directory: ./mobile/${{ matrix.app }}
        env:
          EXPO_PUBLIC_API_URL: "https://papeterie.vercel.app/api"
          CI: "1"
        run: npx expo prebuild --platform android --clean

      - name: Creation du google-services.json
        working-directory: ./mobile/${{ matrix.app }}/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            cat > google-services.json << EOF
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "papeterie-app",
              "storage_bucket": "papeterie-app.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "${{ matrix.package }}" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIza0000000000000000000000000000000000000" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Afficher le build.gradle genere (diagnostic)
        working-directory: ./mobile/${{ matrix.app }}/android/app
        run: |
          echo "=== build.gradle signingConfigs ==="
          grep -A 20 "signingConfigs" build.gradle || echo "Aucun signingConfigs trouve"
          echo "=== buildTypes release ==="
          grep -A 10 "release {" build.gradle || true

      - name: Configurer signing release via gradle.properties
        working-directory: ./mobile/${{ matrix.app }}/android
        run: |
          keytool -genkeypair -v \
            -keystore app/release.keystore \
            -alias papeterie \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Papeterie,OU=Mobile,O=Papeterie,L=Dakar,S=SN,C=SN" \
            -storepass papeterie2024 \
            -keypass papeterie2024
          echo "" >> gradle.properties
          echo "PAPETERIE_STORE_FILE=release.keystore" >> gradle.properties
          echo "PAPETERIE_KEY_ALIAS=papeterie" >> gradle.properties
          echo "PAPETERIE_STORE_PASSWORD=papeterie2024" >> gradle.properties
          echo "PAPETERIE_KEY_PASSWORD=papeterie2024" >> gradle.properties

      - name: Injecter la config signing dans build.gradle via Node.js
        working-directory: ./mobile/${{ matrix.app }}/android/app
        run: |
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('build.gradle', 'utf8');

          // Ajouter signingConfig release si pas deja present
          const signingBlock = \`
              signingConfigs {
                  release {
                      storeFile file(PAPETERIE_STORE_FILE)
                      storePassword PAPETERIE_STORE_PASSWORD
                      keyAlias PAPETERIE_KEY_ALIAS
                      keyPassword PAPETERIE_KEY_PASSWORD
                  }
              }
          \`;

          if (!content.includes('PAPETERIE_STORE_FILE')) {
              // Inserer avant buildTypes
              content = content.replace('buildTypes {', signingBlock + '\n    buildTypes {');
          }

          // Associer signingConfig.release au buildType release
          content = content.replace(
              /release\s*\{([^}]*)}/,
              (match, inner) => {
                  if (!inner.includes('signingConfig')) {
                      return match.replace(inner, inner + '\n            signingConfig signingConfigs.release\n        ');
                  }
                  return match;
              }
          );

          fs.writeFileSync('build.gradle', content);
          console.log('build.gradle patche avec succes');
          "

      - name: Compilation APK Release (bundle JS inclus)
        working-directory: ./mobile/${{ matrix.app }}/android
        env:
          EXPO_PUBLIC_API_URL: "https://papeterie.vercel.app/api"
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload de l APK
        uses: actions/upload-artifact@v4
        with:
          name: papeterie-${{ matrix.app }}-release
          path: mobile/${{ matrix.app }}/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Succes
        run: |
          echo "APK ${{ matrix.name }} pret !"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
