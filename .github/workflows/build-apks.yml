name: Build APKs Android (Client & Livreur)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/**"

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: user-app
            name: "Client"
            package: "com.papeterie.userapp"
          - app: driver-app
            name: "Livreur"
            package: "com.papeterie.driverapp"
    name: "Build APK ${{ matrix.name }}"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Installation des dependances
        working-directory: ./mobile/${{ matrix.app }}
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: ./mobile/${{ matrix.app }}
        env:
          EXPO_PUBLIC_API_URL: "https://papeterie.vercel.app/api"
          CI: "1"
        run: npx expo prebuild --platform android --clean

      - name: Installer le keystore comme debug.keystore Android
        run: |
          mkdir -p ~/.android
          cp mobile/papeterie-release.keystore ~/.android/debug.keystore
          echo "Keystore installe"

      - name: Creation du google-services.json
        working-directory: ./mobile/${{ matrix.app }}/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            cat > google-services.json << EOF
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "papeterie-app",
              "storage_bucket": "papeterie-app.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "${{ matrix.package }}" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIza0000000000000000000000000000000000000" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Diagnostic signingConfigs
        working-directory: ./mobile/${{ matrix.app }}/android/app
        run: grep -A 10 'signingConfigs' build.gradle || echo "Pas de signingConfigs trouve"

      - name: Compilation APK Release
        working-directory: ./mobile/${{ matrix.app }}/android
        env:
          EXPO_PUBLIC_API_URL: "https://papeterie.vercel.app/api"
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -150

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: papeterie-${{ matrix.app }}-release
          path: mobile/${{ matrix.app }}/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Info
        run: echo "APK ${{ matrix.name }} pret - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
